# Macro / economic-event layer configuration (declarative, versioned).
#
# Loaded by macro/config.py into a typed MacroConfig. This declares the
# economic-release calendar ingested from FRED/ALFRED and the leak-safe event
# features built from it. Everything here is tunable WITHOUT touching code.
#
# POINT-IN-TIME RULE (the whole game — see docs/MACRO.md):
#   * Scheduled release TIMES are public in advance, so "minutes to the next
#     CPI / FOMC" is a legitimate feature available BEFORE the event.
#   * Release VALUES (actual / prior) are known only AT/AFTER the release. We use
#     the FIRST-PRINT value (FRED output_type=4 = "Observations, Initial Release
#     Only"); the observation's realtime_start is the publication date, combined
#     with the standard release clock time below to form the UTC event_time.
#
# Bump `macro_version` if a change would alter ingested event rows, and
# `features.macro_feature_version` if it would alter emitted feature values.

macro_version: "v2"  # v2: added 2nd-tier release series (indpro..newhome) as data rows

# Release clock is US Eastern; combined with the first-print release DATE to form
# the UTC event_time. US data releases are at 08:30 ET; FOMC statement at 14:00 ET.
timezone: America/New_York

# Economic-data events ingested from FRED/ALFRED (first-print via output_type=4).
# Each carries a FRED series id, the standard release clock time (ET), a human
# label, and whether it is high-impact (drives the aggregate timing features).
# NOTE on `surprise`: FRED carries no consensus/expectations series, so `surprise`
# (actual vs consensus) is left NULL — never fabricated. The outcome feature is
# the change vs the prior release (actual_pit - prior), which is not a surprise.
events:
  cpi:      {series_id: CPIAUCSL, release_et: "08:30", label: "CPI, all items (SA)",              high_impact: true}
  core_cpi: {series_id: CPILFESL, release_et: "08:30", label: "Core CPI, ex food & energy (SA)",  high_impact: true}
  pce:      {series_id: PCEPI,    release_et: "08:30", label: "PCE price index (SA)",              high_impact: true}
  core_pce: {series_id: PCEPILFE, release_et: "08:30", label: "Core PCE, ex food & energy (SA)",  high_impact: true}
  nfp:      {series_id: PAYEMS,   release_et: "08:30", label: "Nonfarm payrolls (SA)",             high_impact: true}
  unrate:   {series_id: UNRATE,   release_et: "08:30", label: "Unemployment rate (SA)",            high_impact: true}
  claims:   {series_id: ICSA,     release_et: "08:30", label: "Initial jobless claims (SA)",       high_impact: false}
  gdp:      {series_id: GDPC1,    release_et: "08:30", label: "Real GDP, advance (SAAR)",          high_impact: true}
  retail:   {series_id: RSAFS,    release_et: "08:30", label: "Advance retail sales (SA)",         high_impact: true}
  ppi:      {series_id: PPIFIS,   release_et: "08:30", label: "PPI final demand (SA)",             high_impact: false}
  # --- v2 additions: second-tier releases, all first-print verified on FRED ----
  # Added as available event ROWS only (high_impact: false, and intentionally NOT
  # wired into any features.* list below), so they enrich the macro data WITHOUT
  # changing any existing macro feature value — the settled Phase-6 feature layer
  # (macro_feature_version v1) is preserved byte-for-byte. Wiring them into a future
  # feature version is a separate, deliberate step.
  indpro:   {series_id: INDPRO,   release_et: "09:15", label: "Industrial production (SA)",        high_impact: false}
  houst:    {series_id: HOUST,    release_et: "08:30", label: "Housing starts (SAAR)",             high_impact: false}
  permit:   {series_id: PERMIT,   release_et: "08:30", label: "Building permits (SAAR)",           high_impact: false}
  durables: {series_id: DGORDER,  release_et: "08:30", label: "Durable goods orders (SA)",         high_impact: false}
  income:   {series_id: PI,       release_et: "08:30", label: "Personal income (SA)",              high_impact: false}
  umcsent:  {series_id: UMCSENT,  release_et: "10:00", label: "U. Michigan consumer sentiment",    high_impact: false}
  jolts:    {series_id: JTSJOL,   release_et: "10:00", label: "JOLTS job openings (SA)",           high_impact: false}
  newhome:  {series_id: HSN1F,    release_et: "10:00", label: "New single-family home sales (SAAR)", high_impact: false}

# FOMC scheduled meetings. The rate DECISION is announced when the statement is
# released at 14:00 ET on the second (decision) day. The schedule is published far
# in advance, so timing features are point-in-time legitimate. The rate OUTCOME is
# the federal-funds target UPPER limit (DFEDTARU, first-print) as of each meeting.
#
# INTERMEETING EMERGENCY actions are deliberately EXCLUDED from this scheduled
# calendar (they are not knowable in advance): the Mar-2020 COVID emergency cuts
# (2020-03-03, 2020-03-15, 2020-03-23, 2020-03-31) and the 2019-10-11 balance-sheet
# announcement are omitted; Jackson Hole symposiums (e.g. 2020-08-27, 2025-08-22)
# are not FOMC meetings. The scheduled March-2020 slot is its calendared 03-18.
# Decision dates verified against federalreserve.gov FOMC calendars (8/year).
fomc:
  release_et: "14:00"
  rate_series_id: DFEDTARU
  high_impact: true
