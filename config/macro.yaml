# ISM manufacturing & non-manufacturing (services) PMIs are intentionally NOT
# ingested. The Institute for Supply Management's data was REMOVED from FRED on
# 2016-06-24 over a licensing dispute, so it is not available from this free
# source — and we do not fabricate it. Documented in docs/MACRO.md.

# --- Leak-safe event features (features/macro_features.py) -------------------
features:
  macro_feature_version: "v1"
  # Per-type minutes-to-next / minutes-since-last (timing, schedule-known-ahead).
  timing_types: [fomc, cpi, nfp, pce]
  # Per-type "actual - prior" change at the most recent release (outcome, backward).
  outcome_types: [cpi, core_cpi, pce, core_pce, nfp, unrate, claims, gdp, retail, ppi, fomc]
  # Short rolling mean of recent release changes (indicator momentum).
  tendency_types: [cpi, nfp]
  tendency_window: 3              # number of past releases averaged
  blackout_lead_minutes: 120      # "pre-event blackout" flag: within N minutes before a high-impact event
  next_horizon_hours: 24          # count of high-impact events scheduled in the next N hours
