# News / sentiment layer configuration (declarative, versioned). ZERO-SPEND PHASE.
#
# Loaded by sentiment/config.py into a typed SentimentConfig. This layer is the
# next candidate "genuinely new information" lever after four honest no-edge results
# (price, macro, TA, microstructure — see docs/RESEARCH_VERDICTS.md). THIS PHASE IS
# SCAFFOLD ONLY: no model verdict, no strategy, no broad ingestion, no paid calls.
#
# Source policy is enforced in code by options_system.common.external_data_policy
# (which is the authoritative source of truth and fails closed on unknown sources).
# The mapping below is declarative documentation; it is cross-checked against the
# code, never trusted over it. Network access is OFF by default and only ever happens
# for a free_no_auth source when --allow-network is explicitly passed.

sentiment_feature_version: "s1"

# Candidate sources for design/scaffold only (all free / no-auth or local).
default_sources:
  - gdelt
  - sec_edgar

# Policy per source (must agree with external_data_policy.DEFAULT_REGISTRY).
source_policy:
  gdelt: free_no_auth          # free/open global news metadata + tone
  sec_edgar: free_no_auth      # data.sec.gov — no API key, just a UA header
  finbert_local: local_only    # local FinBERT weights; never hits the network
  finnhub: paid_blocked        # credentialed/paid — blocked
  databento: paid_blocked      # paid per-byte — blocked (see databento_guard)

# Default scaffold window (used only for dry-run plans / fixture labelling).
windows:
  start: "2026-01-26"
  end: "2026-06-06"

# Topics the adapters would query (used to label fixtures + future bounded fetches).
query_topics:
  - fed
  - inflation
  - rates
  - recession
  - earnings
  - ai_capex
  - semiconductors
  - megacap_tech
  - risk_off

# Local scoring model. local_only => never downloads weights silently; if the
# weights are absent the scorer fails with instructions (see scoring.py).
scoring:
  model: "ProsusAI/finbert"
  labels: [positive, negative, neutral]
  local_only: true

# Lake dataset names (under data/, gitignored). Raw text and scores are separate.
storage:
  raw_dataset: "sentiment_raw"
  scored_dataset: "sentiment_scores"

# Bounded fetch limits (a real fetch, behind --allow-network, must respect these).
# In this phase they only shape dry-run plans; no fetch is performed.
fetch_limits:
  max_records: 250            # hard cap on records per bounded fetch
  default_language: "eng"     # GDELT language code; null = any
  sec_user_agent: "Options-System research (contact: set-in-env)"  # SEC requires a UA

# Point-in-time sentiment feature AGGREGATION (Phase 17 — fixture/offline scaffold).
#
# This is a SEPARATE version axis from sentiment_feature_version above. That top-level
# value (s1) stamps the raw/scored EVENT schema and is unchanged. `aggregation.feature_version`
# is the AGGREGATE feature layer — s2 is the first aggregate feature version, built on s1
# events. Emitted feature/coverage frames stamp sentiment_feature_version = this value.
#
# Causality: every aggregate uses observed_at (NOT published_at / ingested_at) and the
# half-open window (target_time - window, target_time]. No network, no scoring here.
aggregation:
  feature_version: "s2"

  # Trailing windows (name -> minutes). All UTC. The widest window doubles as the
  # "has any prior sentiment" horizon for coverage.
  windows:
    "15m": 15
    "60m": 60
    "240m": 240
    "1d": 1440

  # Which breakdown groups to emit. all_sources_all_topics gets the full field set;
  # by_source / by_topic get the reduced breakdown_fields over the curated lists below.
  groups:
    - all_sources_all_topics
    - by_source
    - by_topic

  # Full field set for the global (all_sources_all_topics) group.
  fields:
    - event_count
    - degraded_count
    - mean_sentiment_score
    - sum_sentiment_score
    - mean_positive_score
    - mean_negative_score
    - mean_neutral_score
    - max_abs_sentiment_score
    - latest_observed_age_minutes

  # Reduced field set for the per-source / per-topic breakdowns (keeps column count
  # conservative — full fields only at the global level).
  breakdown_fields:
    - event_count
    - mean_sentiment_score

  # Emit a per-(group, window) explicit missing flag (Int8: 1 if any event, else 0) for
  # the global group, so a model can tell "score null because no events" from a real null.
  emit_has_any: true

  # Curated, SANITIZED breakdown keys. MUST be subsets of default_sources / query_topics
  # above — feature columns are never derived from arbitrary raw strings.
  breakdown_sources:
    - gdelt
    - sec_edgar
  breakdown_topics:
    - fed
    - inflation
    - rates
